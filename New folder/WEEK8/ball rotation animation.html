<!DOCTYPE html>
<html>
<head>
    <title>Bouncing Ball</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .ball {
            width: 80px;
            height: 80px;
            background-color: red;
            border-radius: 50%;
            animation: bounce 1s infinite alternate ease-in-out;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(-200px);
            }
        }
    </style>
</head>
<body>

    <div class="ball"></div>

</body>
</html>
