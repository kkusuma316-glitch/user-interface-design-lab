<html>
<head>
<style>
h1, h2 
{
  background-color: pink;
  text-decoration: underline;
  text-align: center;
  text-transform: uppercase;
  color: red;
  border-style: solid;
  border-width: 3px;
  border-color: blue;
  padding: 10px; 
} 
p 
{
  background-color: pink;
  text-decoration: overline underline;
  text-align: center;
  text-transform: lowercase;
  color: blue;
}
.circle {
  list-style-type: circle;
}
.square {
  list-style-type: square;
}
</style>
</head>
<body>

<h1>This is Heading 1</h1>
<h2>This is Heading 2</h2>

<p>This is a paragraph</p>

<ul class="circle">
    <li>Item 1</li>
    <li>Item 2</li>
</ul>

<ul class="square">
    <li>Item A</li>
    <li>Item B</li>
</ul>

</body>
</html>
