<!DOCTYPE html>
<html>
<head>
    <title>Mini Website</title>

    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4b6cb7, #182848);
        }

        .container{
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            text-align: center;
            color: #182848;
        }

        .navbar{
            text-align: center;
            margin-bottom: 20px;
        }

        .navbar a{
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 10px;
            background: #182848;
            color: white;
            border-radius: 5px;
            font-weight: bold;
        }

        .navbar a:hover{
            background: #4b6cb7;
        }

        iframe{
            width: 100%;
            height: 300px;
            border: 2px solid #182848;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>My Mini Website</h1>

    <div class="navbar">
        <a hrefdoc="
            <h2>Welcome to Home Page</h2>
            <p>This is the home section of the mini website.</p>
        " target="content">Home</a>

        <a hrefdoc="
            <h2>About Us</h2>
            <p>This page contains information about our website.</p>
        " target="content">About</a>

        <a hrefdoc="
            <h2>Contact Us</h2>
            <p>Email: example@gmail.com</p>
            <p>Phone: 9876543210</p>
        " target="content">Contact</a>
    </div>

    <iframe name="content"
        srcdoc="
            <h2>Welcome to Home Page</h2>
            <p>This is the home section of the mini website.</p>
        ">
    </iframe>

</div>

</body>
</html>
